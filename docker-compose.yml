# ═══════════════════════════════════════════════════════════════
# YouInst AI — Docker Compose
# Services: webapp (Next.js), workers (BullMQ), redis, postgres
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop
#
# DB migrations (first time or after schema changes):
#   docker compose exec webapp npx prisma migrate deploy
# ═══════════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: youinst
      POSTGRES_PASSWORD: youinst
      POSTGRES_DB: youinst
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U youinst"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  webapp:
    build:
      context: .
      dockerfile: Dockerfile.webapp
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://youinst:youinst@postgres:5432/youinst
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-youinst-secret-change-in-prod}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - output_data:/app/output

  workers:
    build:
      context: .
      dockerfile: Dockerfile.engine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://youinst:youinst@postgres:5432/youinst
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - output_data:/app/output

volumes:
  postgres_data:
  redis_data:
  output_data:
