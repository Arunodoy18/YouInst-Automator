# ═══════════════════════════════════════════════════════════════
# YouInst AI — Docker Compose
# Services: webapp (Next.js + pipeline), engine (BullMQ workers), redis
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # Follow logs
#   docker compose down           # Stop
#
# Without Redis (dev mode):
#   docker compose up webapp      # Just the webapp (pipeline runs in-process)
# ═══════════════════════════════════════════════════════════════

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  webapp:
    build:
      context: .
      dockerfile: Dockerfile.webapp
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:/app/data/youinst.db
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-youinst-secret-change-in-prod}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - app_data:/app/data
      - output_data:/app/output

  workers:
    build:
      context: .
      dockerfile: Dockerfile.engine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=file:/app/data/youinst.db
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - app_data:/app/data
      - output_data:/app/output

volumes:
  redis_data:
  app_data:
  output_data:
